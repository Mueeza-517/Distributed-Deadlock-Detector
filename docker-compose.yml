version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: deadlock_postgres
    environment:
      POSTGRES_USER: deadlock_user
      POSTGRES_PASSWORD: deadlock_pass
      POSTGRES_DB: deadlock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deadlock_network

  mongodb:
    image: mongo:6
    container_name: deadlock_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: deadlock_user
      MONGO_INITDB_ROOT_PASSWORD: deadlock_pass
      MONGO_INITDB_DATABASE: deadlock_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - deadlock_network

  neo4j:
    image: neo4j:5
    container_name: deadlock_neo4j
    environment:
      NEO4J_AUTH: neo4j/deadlock123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt connection
    volumes:
      - neo4j_data:/data
    networks:
      - deadlock_network

volumes:
  postgres_data:
  mongodb_data:
  neo4j_data:

networks:
  deadlock_network:
    driver: bridge