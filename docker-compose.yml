services:

  postgres:
    image: postgres:16
    container_name: deadlock_postgres
    environment:
      POSTGRES_DB: deadlock_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: deadlock_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: deadlock_neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  backend:
    build: ./server
    container_name: deadlock_backend
    ports:
      - "8000:8000"
    environment:
      PG_HOST: postgres
      PG_DB: deadlock_db
      PG_USER: postgres
      PG_PASSWORD: pass123
      MONGO_URI: mongodb://mongodb:27017/
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j123
      HF_TOKEN: ${HF_TOKEN}
    depends_on:
      - postgres
      - mongodb
      - neo4j
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  neo4j_data: